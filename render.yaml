services:
  - type: web
    name: apprendiamo-italiano-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase: 
          name: apprendiamo_db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: apprendiamo_db
    plan: free
