databases:
  - name: apprendo-db
    databaseName: apprendiamo_db
    user: apprendo_user
    plan: free

services:
  - type: web
    name: apprendo-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: apprendo-db
          property: connectionString
