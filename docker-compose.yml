services:
  db:
    image: postgres:16
    container_name: apprendiamo_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: apprendiamo_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apprendiamo_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    container_name: apprendiamo_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:admin@db:5432/apprendiamo_db
      DB_MAX_RETRIES: "30"
      DB_RETRY_DELAY: "2"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata: